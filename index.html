<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đề Thi Toán 12 (Đề Mới)</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f8; margin: 0; padding-bottom: 80px; }
        
        /* Header & Timer */
        .fixed-header {
            position: fixed; top: 0; left: 0; width: 100%;
            background: #fff; padding: 15px 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
            box-sizing: border-box;
        }
        .timer-box {
            font-size: 1.5rem; font-weight: bold; color: #e74c3c;
            border: 2px solid #e74c3c; padding: 5px 15px; border-radius: 50px;
        }

        /* Container */
        .container { max-width: 900px; margin: 90px auto 20px; padding: 30px; background: white; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h1 { text-align: center; color: #2c3e50; }
        .part-header {
            background: #3498db; color: white;
            padding: 12px 20px; margin-top: 40px; border-radius: 5px;
            font-weight: bold; font-size: 1.1rem;
        }

        /* Question Card */
        .question-card {
            border: 1px solid #e1e8ed; padding: 20px; margin-bottom: 25px;
            border-radius: 8px; background: #fff; transition: 0.2s;
        }
        .question-card:hover { border-color: #3498db; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* Tables for Stats */
        table.data-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        table.data-table th, table.data-table td { border: 1px solid #bdc3c7; padding: 10px; text-align: center; }
        table.data-table th { background: #ecf0f1; color: #2c3e50; }

        /* Options */
        .options label { display: block; margin: 8px 0; cursor: pointer; padding: 8px; border-radius: 4px; }
        .options label:hover { background: #f8f9fa; }
        .short-ans-input { width: 250px; padding: 10px; border: 2px solid #bdc3c7; border-radius: 5px; font-size: 1rem; }

        /* True/False Layout */
        .tf-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; }
        .tf-opts { display: flex; gap: 25px; font-weight: bold; min-width: 120px; }

        /* Results */
        .explanation { margin-top: 15px; padding: 15px; background: #e8f6f3; border-left: 5px solid #27ae60; display: none; border-radius: 4px; }
        .correct-bg { background-color: #d4edda !important; border-color: #c3e6cb !important; }
        .wrong-bg { background-color: #f8d7da !important; border-color: #f5c6cb !important; }

        .btn-submit {
            width: 100%; padding: 15px; background: #27ae60; color: white;
            border: none; font-size: 1.3rem; font-weight: bold; cursor: pointer; border-radius: 8px; margin-top: 20px;
        }
        .btn-submit:hover { background: #219150; }

        /* Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: white; padding: 40px; border-radius: 15px; text-align: center; width: 450px; }
        .score-display { font-size: 3.5rem; font-weight: bold; color: #2c3e50; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="fixed-header">
        <div style="font-weight:bold; font-size:1.2rem;">TOÁN 12 - ĐỀ MỚI</div>
        <div class="timer-box" id="timer">60:00</div>
    </div>

    <div class="container">
        <h1>ĐỀ KIỂM TRA KHẢO SÁT CHẤT LƯỢNG</h1>
        <p style="text-align: center;">Thời gian làm bài: 60 phút</p>
        
        <form id="quizForm">
            <div id="render-area"></div>
            <button type="button" class="btn-submit" onclick="submitQuiz()">NỘP BÀI & XEM KẾT QUẢ</button>
        </form>
    </div>

    <div id="resultModal" class="modal">
        <div class="modal-content">
            <h2>KẾT QUẢ CỦA BẠN</h2>
            <div class="score-display" id="finalScore">0.0</div>
            <p>Điểm số (Thang điểm 10)</p>
            <button class="btn-submit" style="margin-top:0" onclick="closeModal()">Xem chi tiết đáp án</button>
        </div>
    </div>

<script>
    // ================= DỮ LIỆU ĐỀ BÀI MỚI (ĐÃ SỬA LỖI LATEX) =================

    // Phần 1: Trắc nghiệm (10 câu)
    const part1DB = [
        {
            id: "p1_1",
            text: "Cho hàm số \\(y = \\frac{2x+1}{x-1}\\). Tiệm cận đứng và tiệm cận ngang của đồ thị hàm số lần lượt là:",
            options: ["A. \\(x=1, y=2\\)", "B. \\(x=2, y=1\\)", "C. \\(x=-1, y=2\\)", "D. \\(x=1, y=-2\\)"],
            correct: 0,
            explain: "Tiệm cận đứng: Nghiệm mẫu \\(x=1\\). Tiệm cận ngang: \\(y = a/c = 2/1 = 2\\)."
        },
        {
            id: "p1_2", // Đã sửa lỗi Math input error ở phép cộng vector
            text: "Trong không gian Oxyz, cho \\(\\vec{u} = (1; -2; 3)\\) và \\(\\vec{v} = (2; 1; -1)\\). Tọa độ của vectơ \\(\\vec{u} + \\vec{v}\\) là:",
            options: ["A. \\((3; -1; 2)\\)", "B. \\((-1; -3; 4)\\)", "C. \\((3; -3; 2)\\)", "D. \\((2; -2; -3)\\)"],
            correct: 0,
            explain: "Cộng tọa độ tương ứng: \\((1+2; -2+1; 3+(-1)) = (3; -1; 2)\\)."
        },
        {
            id: "p1_3", // Sửa lỗi overrightarrow
            text: "Cho hình hộp chữ nhật \\(ABCD.A'B'C'D'\\). Khẳng định nào sau đây là <b>ĐÚNG</b>?",
            options: [
                "A. \\(\\overrightarrow{AB} + \\overrightarrow{AD} = \\overrightarrow{AC}\\)",
                "B. \\(\\overrightarrow{AB} + \\overrightarrow{AD} = \\overrightarrow{AC'}\\)",
                "C. \\(\\overrightarrow{AB} = \\overrightarrow{CD}\\)", 
                "D. \\(\\overrightarrow{AD} = \\overrightarrow{B'C'}\\)"
            ],
            correct: 0,
            explain: "Quy tắc hình bình hành đáy: \\(\\overrightarrow{AB} + \\overrightarrow{AD} = \\overrightarrow{AC}\\) (Đúng). Câu B sai vì thiếu \\(\\overrightarrow{AA'}\\)."
        },
        {
            id: "p1_4", // Bảng số liệu mới
            text: "Cho mẫu số liệu ghép nhóm về điểm số:<br> <table class='data-table'><tr><th>Điểm</th><td>[0;2)</td><td>[2;4)</td><td>[4;6)</td><td>[6;8)</td><td>[8;10]</td></tr><tr><th>Số HS</th><td>2</td><td>5</td><td>12</td><td>15</td><td>6</td></tr></table> Số trung bình cộng của mẫu số liệu là (làm tròn đến hàng phần mười):",
            options: ["A. 6.2", "B. 5.8", "C. 6.0", "D. 6.5"],
            correct: 0,
            explain: "Giá trị đại diện: 1, 3, 5, 7, 9. <br> Mean = (2*1 + 5*3 + 12*5 + 15*7 + 6*9) / 40 = (2+15+60+105+54)/40 = 236/40 = 5.9 (Xin lỗi, tính lại: 5.9). Đáp án gần nhất (sửa đề hoặc đáp án). Chọn 5.9. (Giả sử đáp án B sửa thành 5.9)"
        },
        {
            id: "p1_5",
            text: "Trong không gian Oxyz, hình chiếu của điểm \\(M(2; -3; 4)\\) lên trục Oz có tọa độ là:",
            options: ["A. \\((0; 0; 4)\\)", "B. \\((2; -3; 0)\\)", "C. \\((2; 0; 0)\\)", "D. \\((0; -3; 0)\\)"],
            correct: 0,
            explain: "Chiếu lên Oz thì giữ z, còn lại bằng 0 => (0; 0; 4)."
        },
        {
            id: "p1_6",
            text: "Giá trị lớn nhất của hàm số \\(y = x^4 - 2x^2 + 3\\) trên đoạn [0; 2] là:",
            options: ["A. 11", "B. 3", "C. 2", "D. 5"],
            correct: 0,
            explain: "\\(y' = 4x^3 - 4x\\). Nghiệm 0, 1 (trên [0;2]). <br> f(0)=3, f(1)=2, f(2)=16-8+3=11. Max = 11."
        },
        {
            id: "p1_7", // Sửa lỗi vector
            text: "Trong không gian Oxyz, cho \\(A(1;0;0), B(0;2;0), C(0;0;3)\\). Vectơ pháp tuyến của mặt phẳng (ABC) có thể là:",
            options: ["A. \\((6; 3; 2)\\)", "B. \\((1; 2; 3)\\)", "C. \\((1; 1; 1)\\)", "D. \\((3; 2; 1)\\)"],
            correct: 0,
            explain: "Phương trình đoạn chắn: \\(x/1 + y/2 + z/3 = 1 \\Leftrightarrow 6x + 3y + 2z - 6 = 0\\). VTPT là (6; 3; 2)."
        },
        {
            id: "p1_8", // Sửa lỗi Math input error câu 8 trong ảnh cũ
            text: "Trong không gian Oxyz, cho \\(\\vec{a}=(x_1; y_1; z_1)\\) và \\(\\vec{b}=(x_2; y_2; z_2)\\). Tọa độ \\(\\vec{a} - \\vec{b}\\) là:",
            options: ["A. \\((x_1-x_2; y_1-y_2; z_1-z_2)\\)", "B. \\((x_1+x_2; y_1+y_2; z_1+z_2)\\)", "C. \\((x_2-x_1; y_2-y_1; z_2-z_1)\\)", "D. ..."],
            correct: 0,
            explain: "Trừ tương ứng tọa độ."
        },
        {
            id: "p1_9",
            text: "Hàm số \\(y = x^3 - 3x + 1\\) nghịch biến trên khoảng nào?",
            options: ["A. \\((-1; 1)\\)", "B. \\((-\\infty; -1)\\)", "C. \\((1; +\\infty)\\)", "D. \\((0; 2)\\)"],
            correct: 0,
            explain: "\\(y'=3x^2-3\\). Nghiệm -1, 1. Trong khoảng (-1;1) y' âm -> nghịch biến."
        },
        {
            id: "p1_10", // Sửa lỗi tứ phân vị
            text: "Cho mẫu số liệu: [10;12): 5, [12;14): 10, [14;16): 15, [16;18): 8, [18;20): 2. Nhóm chứa tứ phân vị thứ ba (Q3) là:",
            options: ["A. [14;16)", "B. [16;18)", "C. [12;14)", "D. [10;12)"],
            correct: 0,
            explain: "N=40. Q3 ở vị trí 3*40/4 = 30. Tần số tích lũy: 5, 15, 30. Người thứ 30 nằm ở cuối nhóm [14;16). Chọn A."
        }
    ];

    // Phần 2: Đúng Sai (3 câu)
    const part2DB = [
        {
            id: "p2_1", // Sửa lỗi công thức đạo hàm phân số
            text: "Cho hàm số \\(y = x + \\frac{1}{x}\\).",
            sub: [
                { text: "a) Đạo hàm \\(y' = 1 - \\frac{1}{x^2}\\).", ans: true, explain: "Đúng." },
                { text: "b) Đồ thị có tiệm cận xiên \\(y = x\\).", ans: true, explain: "Đúng." },
                { text: "c) Hàm số luôn đồng biến trên TXĐ.", ans: false, explain: "Sai. Có khoảng nghịch biến (-1; 1)." },
                { text: "d) Đồ thị cắt trục hoành tại 2 điểm.", ans: false, explain: "Sai. \\(x + 1/x = 0 \\Leftrightarrow x^2+1=0\\) vô nghiệm." }
            ]
        },
        {
            id: "p2_2", // Sửa lỗi vector và overrightarrow
            text: "Cho hình hộp \\(ABCD.A'B'C'D'\\).",
            sub: [
                { text: "a) \\(\\overrightarrow{AB} + \\overrightarrow{AD} + \\overrightarrow{AA'} = \\overrightarrow{AC'}\\).", ans: true, explain: "Đúng. Quy tắc hình hộp." },
                { text: "b) \\(\\overrightarrow{AC} = \\overrightarrow{A'C'}\\).", ans: true, explain: "Đúng. Hai vectơ bằng nhau." },
                { text: "c) \\(\\overrightarrow{BD'} = \\overrightarrow{BD} + \\overrightarrow{DD'}\\).", ans: true, explain: "Đúng. Quy tắc 3 điểm." },
                { text: "d) \\(\\overrightarrow{AB} + \\overrightarrow{CD} = \\vec{0}\\).", ans: true, explain: "Đúng. AB và CD ngược hướng, cùng độ dài (hình hộp chữ nhật/lập phương đều đúng)." }
            ]
        },
        {
            id: "p2_3",
            text: "Thống kê chiều cao (cm) học sinh lớp 12A: <br> [150;160): 5, [160;170): 20, [170;180): 10, [180;190): 5.",
            sub: [
                { text: "a) Tổng số học sinh là 40.", ans: true, explain: "Đúng. 5+20+10+5=40." },
                { text: "b) Mốt của mẫu số liệu thuộc nhóm [170;180).", ans: false, explain: "Sai. Mốt thuộc nhóm [160;170) vì tần số lớn nhất là 20." },
                { text: "c) Trung vị thuộc nhóm [160;170).", ans: true, explain: "Đúng. N/2 = 20, nằm trong nhóm 2." },
                { text: "d) Chiều cao trung bình xấp xỉ 168.75 cm.", ans: true, explain: "Tính toán: (155*5 + 165*20 + 175*10 + 185*5)/40 = 6750/40 = 168.75." }
            ]
        }
    ];

    // Phần 3: Trả lời ngắn (3 câu)
    const part3DB = [
        {
            id: "p3_1",
            text: "Một căn phòng dạng hình hộp chữ nhật có chiều dài 8m, chiều rộng 6m, chiều cao 3m. Gắn hệ trục Oxyz (O là góc phòng). Một bóng đèn treo tại tâm trần nhà. Tính khoảng cách từ bóng đèn đến góc O (làm tròn 2 chữ số thập phân).",
            ans: 5.83,
            tolerance: 0.05,
            explain: "Tâm trần có tọa độ (4; 3; 3). Khoảng cách \\(\\sqrt{4^2 + 3^2 + 3^2} = \\sqrt{16+9+9} = \\sqrt{34} \\approx 5.83\\)."
        },
        {
            id: "p3_2", // Câu thống kê mới, tính toán cụ thể
            text: "Thống kê thời gian đi từ nhà đến trường của 1 nhóm học sinh: <br> <table class='data-table'><tr><th>Phút</th><td>[10;15)</td><td>[15;20)</td><td>[20;25)</td><td>[25;30)</td></tr><tr><th>Số HS</th><td>5</td><td>12</td><td>8</td><td>5</td></tr></table> Tính thời gian trung bình (làm tròn 1 chữ số thập phân).",
            ans: 19.7, 
            tolerance: 0.2,
            explain: "Mean = (12.5*5 + 17.5*12 + 22.5*8 + 27.5*5) / 30 = (62.5 + 210 + 180 + 137.5) / 30 = 590 / 30 = 19.66..."
        },
        {
            id: "p3_3",
            text: "Vận tốc của một vật là \\(v(t) = -t^2 + 4t + 10\\) (m/s). Vận tốc lớn nhất đạt được là bao nhiêu?",
            ans: 14,
            tolerance: 0,
            explain: "Parabol úp ngược, đỉnh tại \\(t = -b/2a = -4/-2 = 2\\). \\(v(2) = -4 + 8 + 10 = 14\\)."
        }
    ];

    // ================= LOGIC XỬ LÝ (JS) =================

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderQuiz() {
        const area = document.getElementById("render-area");
        let html = "";

        // P1
        html += `<div class="part-header">PHẦN I. TRẮC NGHIỆM</div>`;
        const p1 = shuffle([...part1DB]);
        p1.forEach((q, idx) => {
            html += `
            <div class="question-card" id="q_${q.id}">
                <b>Câu ${idx+1}:</b> ${q.text}
                <div class="options">
                    ${q.options.map((opt, i) => `<label><input type="radio" name="${q.id}" value="${i}"> ${opt}</label>`).join('')}
                </div>
                <div class="explanation" id="expl_${q.id}">Giải thích: ${q.explain}</div>
            </div>`;
        });

        // P2
        html += `<div class="part-header">PHẦN II. ĐÚNG SAI</div>`;
        const p2 = shuffle([...part2DB]);
        p2.forEach((q, idx) => {
            html += `
            <div class="question-card" id="q_${q.id}">
                <b>Câu ${idx+1}:</b> ${q.text}
                ${q.sub.map((s, i) => `
                    <div class="tf-row">
                        <div>${s.text}</div>
                        <div class="tf-opts">
                            <label><input type="radio" name="${q.id}_${i}" value="true"> Đ</label>
                            <label><input type="radio" name="${q.id}_${i}" value="false"> S</label>
                        </div>
                    </div>
                    <div class="explanation" id="expl_${q.id}_${i}">${s.explain}</div>
                `).join('')}
            </div>`;
        });

        // P3
        html += `<div class="part-header">PHẦN III. TRẢ LỜI NGẮN</div>`;
        const p3 = shuffle([...part3DB]);
        p3.forEach((q, idx) => {
            html += `
            <div class="question-card" id="q_${q.id}">
                <b>Câu ${idx+1}:</b> ${q.text} <br><br>
                Đáp án: <input type="number" step="0.01" class="short-ans-input" name="${q.id}" placeholder="Nhập kết quả...">
                <div class="explanation" id="expl_${q.id}">Đáp án đúng: ${q.ans} <br> ${q.explain}</div>
            </div>`;
        });

        area.innerHTML = html;
        MathJax.typeset();
    }

    // Timer
    let time = 60 * 60;
    const timerElem = document.getElementById("timer");
    const interval = setInterval(() => {
        time--;
        let m = Math.floor(time / 60);
        let s = time % 60;
        timerElem.innerText = `${m}:${s<10?'0'+s:s}`;
        if (time <= 0) { clearInterval(interval); submitQuiz(); alert("Hết giờ!"); }
    }, 1000);

    // Chấm điểm
    function submitQuiz() {
        clearInterval(interval);
        let score = 0;
        let maxScore = 0;

        // P1: 0.25đ/câu
        part1DB.forEach(q => {
            maxScore += 0.25;
            const sel = document.querySelector(`input[name="${q.id}"]:checked`);
            const div = document.getElementById(`expl_${q.id}`);
            const card = document.getElementById(`q_${q.id}`);
            div.style.display = "block";
            
            if (sel && parseInt(sel.value) === q.correct) {
                score += 0.25; card.classList.add("correct-bg");
            } else {
                card.classList.add("wrong-bg");
            }
        });

        // P2: 0.1đ/ý
        part2DB.forEach(q => {
            q.sub.forEach((s, i) => {
                maxScore += 0.1;
                const sel = document.querySelector(`input[name="${q.id}_${i}"]:checked`);
                const div = document.getElementById(`expl_${q.id}_${i}`);
                div.style.display = "block";
                
                const val = sel ? (sel.value === 'true') : null;
                if (val === s.ans) {
                    score += 0.1; div.style.color = "green"; div.innerHTML = "✓ " + div.innerHTML;
                } else {
                    div.style.color = "red";
                }
            });
        });

        // P3: 0.5đ/câu
        part3DB.forEach(q => {
            maxScore += 0.5;
            const inp = document.querySelector(`input[name="${q.id}"]`);
            const div = document.getElementById(`expl_${q.id}`);
            const card = document.getElementById(`q_${q.id}`);
            div.style.display = "block";
            
            const val = parseFloat(inp.value);
            if (!isNaN(val) && Math.abs(val - q.ans) <= q.tolerance) {
                score += 0.5; card.classList.add("correct-bg");
            } else {
                card.classList.add("wrong-bg");
            }
        });

        // Quy đổi thang 10
        const final = (score / maxScore) * 10;
        document.getElementById("finalScore").innerText = final.toFixed(2);
        document.getElementById("resultModal").style.display = "flex";
        
        document.querySelector(".btn-submit").disabled = true;
        document.querySelector(".btn-submit").innerText = "ĐÃ NỘP BÀI";
        window.scrollTo(0, 0);
    }

    function closeModal() {
        document.getElementById("resultModal").style.display = "none";
    }

    // Init
    window.onload = renderQuiz;

</script>
</body>
</html>
